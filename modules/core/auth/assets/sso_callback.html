<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{.Title}}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f6fa;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #1a1a2e;
    }

    .card {
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08), 0 1px 4px rgba(0, 0, 0, 0.04);
      padding: 48px 56px;
      max-width: 480px;
      width: 90%;
      text-align: center;
    }

    .logo {
      margin-bottom: 40px;
    }

    .logo svg {
      height: 28px;
      width: auto;
    }

    .icon-wrap {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 64px;
      height: 64px;
      border-radius: 50%;
      margin-bottom: 24px;
    }

    .icon-wrap.success {
      background: #e6f9f0;
    }

    .icon-wrap.error {
      background: #fdecea;
    }

    .icon-wrap svg {
      width: 32px;
      height: 32px;
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.3px;
      margin-bottom: 12px;
    }

    h1.success { color: #0f7b4d; }
    h1.error   { color: #c0392b; }

    p {
      font-size: 15px;
      color: #555b6e;
      line-height: 1.6;
    }

    .detail {
      margin-top: 8px;
      font-size: 13px;
      color: #888;
      font-family: "SF Mono", "Fira Code", "Consolas", monospace;
      background: #f5f6fa;
      border-radius: 6px;
      padding: 8px 12px;
      word-break: break-all;
    }

    .divider {
      border: none;
      border-top: 1px solid #eef0f5;
      margin: 32px 0;
    }

    .hint {
      font-size: 13px;
      color: #aab0c0;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      {{.LogoSVG}}
    </div>

    {{if .Success}}
    <div class="icon-wrap success">
      <svg viewBox="0 0 24 24" fill="none" stroke="#0f7b4d" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
    </div>
    <h1 class="success">Login successful</h1>
    <p>You're authenticated. You can close this tab and return to your terminal.</p>
    {{else}}
    <div class="icon-wrap error">
      <svg viewBox="0 0 24 24" fill="none" stroke="#c0392b" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="6" x2="6" y2="18"/>
        <line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </div>
    <h1 class="error">Login failed</h1>
    <p>{{.ErrorMessage}}</p>
    {{if .ErrorDetail}}<div class="detail">{{.ErrorDetail}}</div>{{end}}
    {{end}}

    <hr class="divider">
    <p class="hint">Harness CLI &mdash; SSO authentication</p>
  </div>
</body>
</html>
