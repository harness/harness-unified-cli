version: 2

project_name: harness

before:
  hooks:
    - task tidy

builds:
  - id: harness-core
    main: ./cmd/harness/main-harness.go
    binary: harness
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/harness/cli/pkg/hbase.Version={{.Version}}
      - -X github.com/harness/cli/pkg/hbase.BuildTime={{.Date}}
      - -X github.com/harness/cli/pkg/telemetry.segmentWriteKey={{.Env.SEGMENT_WRITE_KEY}}

  - id: harness-plugin-har
    main: ./modules/har/cmd/harness-har/main-harness-har.go
    binary: harness-har
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/harness/cli/pkg/hbase.Version={{.Version}}
      - -X github.com/harness/cli/pkg/hbase.BuildTime={{.Date}}

archives:
  - id: harness-bundle
    ids: [harness-core, harness-plugin-har]
    formats: [tar.gz]
    name_template: "harness-bundle_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

  - id: harness-core
    ids: [harness-core]
    formats: [tar.gz]
    name_template: "harness-core_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

  - id: harness-plugin-har
    ids: [harness-plugin-har]
    formats: [tar.gz]
    name_template: "harness-plugin-har_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

nfpms:
  - id: harness-core
    package_name: harness-cli
    ids: [harness-core]
    formats:
      - deb
      - rpm
    vendor: Harness
    homepage: https://harness.io
    maintainer: Harness <support@harness.io>
    description: Harness Unified CLI
    license: Apache-2.0
    bindir: /usr/bin

  - id: harness-plugin-har
    package_name: harness-cli-har-plugin
    ids: [harness-plugin-har]
    formats:
      - deb
      - rpm
    vendor: Harness
    homepage: https://harness.io
    maintainer: Harness <support@harness.io>
    description: Harness HAR plugin for the Harness Unified CLI
    license: Apache-2.0
    bindir: /usr/bin

homebrew_casks:
  # skip_upload: cask files are still built into dist/ so this stays testable, but
  # nothing is pushed until harness/homebrew-tap exists and HOMEBREW_TAP_GITHUB_TOKEN
  # is set — see docs/publishing-to-homebrew.md. Remove once both are in place.
  - name: harness
    ids: [harness-bundle]
    binaries: [harness, harness-har]
    skip_upload: true
    repository:
      owner: harness
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Casks
    homepage: "https://harness.io"
    description: "Harness Unified CLI"
    conflicts:
      - cask: harness-core
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/harness"]
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/harness-har"]
          end

  - name: harness-core
    ids: [harness-core]
    binaries: [harness]
    skip_upload: true
    repository:
      owner: harness
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Casks
    homepage: "https://harness.io"
    description: "Harness Unified CLI (core only, no plugins)"
    conflicts:
      - cask: harness
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/harness"]
          end

checksum:
  name_template: "{{ .ProjectName }}_{{ .Version }}_checksums.txt"
  algorithm: sha256

snapshot:
  version_template: "{{ .Tag }}-next"

changelog:
  disable: true

release:
  github:
    owner: harness
    name: cli
  draft: false
  prerelease: auto
  header: "Harness Unified CLI {{ .Tag }}"
